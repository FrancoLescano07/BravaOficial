<script>
const imagesDesktop = [
  "../img/portfolio.png",
  "../img/portfolio-1.png",
  "../img/portfolio-2.png",
  "../img/portfolio-3.png",
  "../img/portfolio-4.png",
  "../img/portfolio-5.png",
  "../img/portfolio-6.png",
  "../img/portfolio-7.png",
  "../img/portfolio-8.png",
  "../img/portfolio-9.png",
  "../img/portfolio-10.png",
  "../img/portfolio-11.png",
  "../img/portfolio-12.png",
  "../img/portfolio-13.png",
  "../img/portfolio-14.png",
  "../img/portfolio-15.png",
  "../img/portfolio-16.png",
  "../img/portfolio-17.png",
  "../img/portfolio-18.png",
  "../img/portfolio-19.png"
];

const imagesMobile = [
  "../img/portfolio-vertical.jpg",
  "../img/portfolio-vertical-1.jpg",
  "../img/portfolio-vertical-2.jpg",
  "../img/portfolio-vertical-3.jpg",
  "../img/portfolio-vertical-4.jpg",
  "../img/portfolio-vertical-5.jpg",
  "../img/portfolio-vertical-6.jpg",
  "../img/portfolio-vertical-7.jpg",
  "../img/portfolio-vertical-8.jpg",
  "../img/portfolio-vertical-9.jpg",
  "../img/portfolio-vertical-10.jpg",
  "../img/portfolio-vertical-11.jpg",
  "../img/portfolio-vertical-12.jpg",
  "../img/portfolio-vertical-13.jpg",
  "../img/portfolio-vertical-14.jpg",
  "../img/portfolio-vertical-15.jpg",
  "../img/portfolio-vertical-16.jpg",
  "../img/portfolio-vertical-17.jpg",
  "../img/portfolio-vertical-18.jpg",
  "../img/portfolio-vertical-19.jpg"
];

let currentIndex = 0;

function getImages() {
  return window.innerWidth <= 768
    ? imagesMobile
    : imagesDesktop;
}

function openModal(index){
  currentIndex = index;

  document.getElementById("modalImg").src =
    getImages()[currentIndex];

  var modal = new bootstrap.Modal(
    document.getElementById('imgModal')
  );

  modal.show();
}

function nextImg(){
  const images = getImages();

  currentIndex =
    (currentIndex + 1) % images.length;

  document.getElementById("modalImg").src =
    images[currentIndex];
}

function prevImg(){
  const images = getImages();

  currentIndex =
    (currentIndex - 1 + images.length) % images.length;

  document.getElementById("modalImg").src =
    images[currentIndex];
}
</script>
